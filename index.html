        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 24px 20px 32px;
        }
        h1 { text-align: center; font-size: 2rem; margin: 0 0 8px; color: #3a2c1f; }
        .sub { text-align: center; color: #9b8a72; margin-bottom: 28px; font-size: 0.85rem; }
        .mode-switch {
            display: flex;
            background: #f0ebe2;
            border-radius: 50px;
            margin-bottom: 24px;
            padding: 4px;
            gap: 4px;
        }
        .mode-btn {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #5c5346;
            border: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: white;
            color: #2c2b28;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .input-area { margin-bottom: 20px; }
        label { font-weight: 600; color: #4a3e2e; margin-left: 8px; display: block; margin-bottom: 8px; }
        textarea {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid #ddd0bc;
            border-radius: 28px;
            background: #fffef8;
            font-family: monospace;
            resize: vertical;
            outline: none;
            min-height: 100px;
        }
        textarea:focus { border-color: #b28b5e; }
        .button-group { display: flex; gap: 12px; margin: 20px 0; }
        button {
            flex: 1;
            background: #2c2b28;
            border: none;
            padding: 14px 0;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        button:active { transform: scale(0.97); }
        .btn-clear { background: #b9ae9c; color: #2c2b28; }
        .result-box {
            background: #f8f3ea;
            border-radius: 32px;
            padding: 18px 20px;
            border: 1px solid #e5d5c0;
            margin-top: 8px;
            min-height: 100px;
        }
        .result-label { font-size: 0.75rem; color: #8b7a64; margin-bottom: 8px; letter-spacing: 1px; }
        .result-text {
            font-size: 1rem;
            line-height: 1.4;
            word-break: break-word;
            color: #2c2b28;
            font-family: 'Courier New', monospace;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            color: #a6967e;
            margin-top: 24px;
        }
        .version {
            font-size: 0.65rem;
            text-align: center;
            color: #c0a080;
            margin-top: 6px;
        }
    </style>
</head>

    function autoChineseToLy(word) {
        let pinyin = "";
        for (let ch of word) {
            pinyin += pinyinMap.get(ch) || ch;
        }
        let ly = pinyin.toLowerCase();
        if (!/[aeiou]$/.test(ly)) ly += "a";
        return "*" + ly;
    }
    function autoEnglishToLy(word) {
        return "*" + word.toLowerCase();
    }

    // 中文分词（最长匹配）
    const zhWordsList = Array.from(zhToLy.keys()).filter(w => w.length > 0).sort((a,b)=>b.length-a.length);
    function segmentChinese(text) {
        let result = [], i = 0;
        const punctuation = /[，,。？?！!；;：:、\s\n\r\t()（）【】\[\]{}""''“”‘’]/;
        while (i < text.length) {
            if (punctuation.test(text[i])) {
                result.push(text[i]);
                i++;
                continue;
            }
            let matched = false;
            const maxLen = Math.min(8, text.length - i);
            for (let len = maxLen; len >= 2; len--) {
                const sub = text.substr(i, len);
                if (zhToLy.has(sub)) {
                    result.push(sub);
                    i += len;
                    matched = true;
                    break;
                }
            }
            if (!matched) {
                result.push(text[i]);
                i++;
            }
        }
        return result;
    }

    // 英文分词（多词短语优先）
    const enPhrases = Array.from(enToLy.keys()).filter(p => p.split(/\s+/).length > 1).sort((a,b)=>b.split(/\s+/).length - a.split(/\s+/).length);
    function tokenizeEnglish(text) {
        let lower = text.toLowerCase();
        let words = lower.split(/\s+/);
        let tokens = [];
        let j = 0;
        while (j < words.length) {
            let matched = false;
            for (let phrase of enPhrases) {
                const phraseWords = phrase.split(/\s+/);
                if (j + phraseWords.length <= words.length) {
                    let slice = words.slice(j, j + phraseWords.length).join(" ");
                    if (slice === phrase) {
                        tokens.push(phrase);
                        j += phraseWords.length;
                        matched = true;
                        break;
                    }
                }
            }
            if (!matched) {
                tokens.push(words[j]);
                j++;
            }
        }
        return tokens;
    }

    // 翻译函数
    function translateZhToLy(sentence) {
        const words = segmentChinese(sentence);
        return words.map(w => {
            if (/[，,。？?！!；;：:、\s\n\r\t()（）【】\[\]{}""''“”‘’]/.test(w)) return w;
            return zhToLy.get(w) || autoChineseToLy(w);
        }).join(' ');
    }
    function translateLyToZh(sentence) {
        return sentence.split(/\s+/).map(t => {
            const clean = t.replace(/^\*/, '');
            return lyToZh.get(clean) || t;
        }).join(' ');
    }
    function translateEnToLy(sentence) {
        const tokens = tokenizeEnglish(sentence);
        return tokens.map(t => enToLy.get(t) || autoEnglishToLy(t)).join(' ');
    }
    function translateLyToEn(sentence) {
        return sentence.split(/\s+/).map(t => {
            const clean = t.replace(/^\*/, '');
            return lyToEn.get(clean) || t;
        }).join(' ');
    }

    function translate() {
        const raw = inputText.value.trim();
        if (!raw) { resultText.innerText = "等待翻译…"; return; }
        let output = "";
        switch(mode) {
            case "zh2ly": output = translateZhToLy(raw); break;
            case "ly2zh": output = translateLyToZh(raw); break;
            case "en2ly": output = translateEnToLy(raw); break;
            case "ly2en": output = translateLyToEn(raw); break;
        }
        resultText.innerText = output;
    }

    function clearAll() {
        inputText.value = "";
        resultText.innerText = "等待翻译…";
    }
